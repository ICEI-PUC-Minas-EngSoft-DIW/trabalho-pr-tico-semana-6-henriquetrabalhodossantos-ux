<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Produto - TradeLink</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<link rel="stylesheet" href="../public/css/produto.css">
</head>
<body>
	<div class="pagina-container">
		<div class="sidebar">
			<div class="logo">
				<img src="../fornecedores/logo.png" alt="TradeLink">
			</div>
			<nav>
				<ul>
					<li class="active"><a href="homepage.html"><i class="fas fa-home"></i> Home</a></li>
					<li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
					<li><a href="fornecedores.html"><i class="fas fa-user"></i> Perfil</a></li>
					<li><a href="pedidos.html"><i class="fas fa-file-invoice"></i> Pedidos/Vendas</a></li>
					<li><a href="historico.html"><i class="fas fa-history"></i> Histórico</a></li>
					<li><a href="chat.html"><i class="fas fa-robot"></i> Chat IA</a></li>
					<li><a href="mensagens.html"><i class="fas fa-envelope"></i> Mensagens</a></li>
					<li class="active"><a href="produto.html"><i class="fas fa-box"></i> Produtos</a></li>
					<li><a href="categoria.html"><i class="fas fa-tags"></i> Categorias</a></li>
					<li><a href="configuracoes.html"><i class="fas fa-cog"></i> Configurações</a></li>
				</ul>
			</nav>
		</div>

		<div class="main-content">
			<header>
				<h1><i class="fas fa-box"></i> Produto</h1>
				<div class="user-info">
					<span>TradeLink</span>
					<img src="../fornecedores/profile.jpg" alt="Usuário">
				</div>
			</header>

			<div class="content">
				<div class="container">
					<nav class="breadcrumbs">Início &gt; Eletrônicos &gt; Notebook Pro 15</nav>

					<section class="product">
						<div class="gallery">
							<div class="main-img">
								<img id="main-img" src="" alt="" style="max-width:100%;max-height:100%;object-fit:contain">
							</div>
						</div>

						<div class="details">
							<div class="title" id="produto-nome"></div>
							<div class="meta">
								<div class="seller" id="produto-fornecedor"></div>
							</div>
							<div class="price" id="produto-preco"></div>
							<div class="description">
								<p id="produto-descricao"></p>
							</div>
						</div>

						<aside class="side">
							<div class="info"><strong>Disponibilidade:</strong> <span id="produto-disponibilidade"></span></div>
							<div class="info"><strong>Categoria:</strong> <span id="produto-categoria"></span></div>
							<div class="info"><strong>Contato:</strong> <span id="produto-contato"></span></div>
						</aside>
					</section>

					<section class="section">
						<h3>Produtos relacionados</h3>
						<div class="related"></div>
					</section>
				</div>
			</div>
		</div>
	</div>

	<script src="../public/js/produto.js"></script>
</body>
</html>
